<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Clean light background -->
    <linearGradient id="in-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="50%" stop-color="#f5f7f9"/>
      <stop offset="100%" stop-color="#eef1f4"/>
    </linearGradient>

    <!-- Sage green orb -->
    <radialGradient id="in-orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7fb069" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7fb069" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="in-orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5a7d5a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#5a7d5a" stop-opacity="0"/>
    </radialGradient>

    <!-- Card shadow/depth -->
    <filter id="in-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#2d3436" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Clean base background -->
  <rect width="1920" height="600" fill="url(#in-bg)"/>

  <!-- Soft ambient orbs -->
  <circle cx="200" cy="450" r="350" fill="url(#in-orb1)"/>
  <circle cx="1750" cy="150" r="300" fill="url(#in-orb2)"/>
  <circle cx="960" cy="550" r="250" fill="url(#in-orb1)" opacity="0.6"/>

  <!-- Staggered document/card shapes (editorial magazine feel) -->
  <g opacity="0.55">
    <!-- Card 1 - top left, rotated -->
    <g transform="rotate(-8 220 180)">
      <rect x="160" y="120" width="120" height="160" rx="8" fill="#ffffff" filter="url(#in-shadow)"/>
      <rect x="175" y="145" width="90" height="8" rx="4" fill="#5a7d5a" opacity="0.35"/>
      <rect x="175" y="162" width="60" height="5" rx="2.5" fill="#7fb069" opacity="0.3"/>
      <rect x="175" y="175" width="75" height="5" rx="2.5" fill="#7fb069" opacity="0.25"/>
      <rect x="175" y="188" width="50" height="5" rx="2.5" fill="#7fb069" opacity="0.2"/>
      <rect x="175" y="205" width="90" height="5" rx="2.5" fill="#7fb069" opacity="0.15"/>
      <rect x="175" y="218" width="70" height="5" rx="2.5" fill="#7fb069" opacity="0.15"/>
      <rect x="175" y="231" width="40" height="5" rx="2.5" fill="#7fb069" opacity="0.15"/>
      <rect x="175" y="250" width="90" height="16" rx="3" fill="#5a7d5a" opacity="0.1"/>
    </g>

    <!-- Card 2 - overlapping card 1 -->
    <g transform="rotate(-3 250 200)">
      <rect x="200" y="150" width="110" height="145" rx="8" fill="#f8f9fa" filter="url(#in-shadow)"/>
      <rect x="215" y="172" width="80" height="7" rx="3.5" fill="#5a7d5a" opacity="0.3"/>
      <rect x="215" y="188" width="55" height="5" rx="2.5" fill="#7fb069" opacity="0.25"/>
      <rect x="215" y="200" width="70" height="5" rx="2.5" fill="#7fb069" opacity="0.2"/>
      <rect x="215" y="212" width="45" height="5" rx="2.5" fill="#7fb069" opacity="0.15"/>
      <rect x="215" y="228" width="80" height="14" rx="3" fill="#5a7d5a" opacity="0.08"/>
    </g>

    <!-- Card 3 - right side, rotated opposite -->
    <g transform="rotate(6 1620 220)">
      <rect x="1560" y="140" width="130" height="170" rx="8" fill="#ffffff" filter="url(#in-shadow)"/>
      <rect x="1578" y="168" width="95" height="9" rx="4.5" fill="#5a7d5a" opacity="0.35"/>
      <rect x="1578" y="186" width="65" height="5" rx="2.5" fill="#7fb069" opacity="0.3"/>
      <rect x="1578" y="198" width="80" height="5" rx="2.5" fill="#7fb069" opacity="0.25"/>
      <rect x="1578" y="210" width="55" height="5" rx="2.5" fill="#7fb069" opacity="0.2"/>
      <rect x="1578" y="222" width="70" height="5" rx="2.5" fill="#7fb069" opacity="0.18"/>
      <rect x="1578" y="240" width="95" height="18" rx="4" fill="#5a7d5a" opacity="0.1"/>
      <rect x="1578" y="266" width="70" height="5" rx="2.5" fill="#7fb069" opacity="0.12"/>
    </g>

    <!-- Card 4 - overlapping right -->
    <g transform="rotate(10 1670 250)">
      <rect x="1600" y="190" width="115" height="150" rx="8" fill="#f8f9fa" filter="url(#in-shadow)"/>
      <rect x="1615" y="212" width="85" height="7" rx="3.5" fill="#5a7d5a" opacity="0.28"/>
      <rect x="1615" y="228" width="60" height="5" rx="2.5" fill="#7fb069" opacity="0.22"/>
      <rect x="1615" y="240" width="75" height="5" rx="2.5" fill="#7fb069" opacity="0.18"/>
      <rect x="1615" y="258" width="85" height="14" rx="3" fill="#5a7d5a" opacity="0.08"/>
    </g>

    <!-- Card 5 - bottom center small -->
    <g transform="rotate(-5 480 420)">
      <rect x="430" y="380" width="100" height="130" rx="6" fill="#ffffff" filter="url(#in-shadow)"/>
      <rect x="443" y="400" width="75" height="7" rx="3.5" fill="#5a7d5a" opacity="0.3"/>
      <rect x="443" y="415" width="50" height="4" rx="2" fill="#7fb069" opacity="0.25"/>
      <rect x="443" y="425" width="65" height="4" rx="2" fill="#7fb069" opacity="0.2"/>
      <rect x="443" y="435" width="45" height="4" rx="2" fill="#7fb069" opacity="0.15"/>
      <rect x="443" y="450" width="75" height="12" rx="3" fill="#5a7d5a" opacity="0.08"/>
    </g>

    <!-- Card 6 - bottom right -->
    <g transform="rotate(4 1380 440)">
      <rect x="1320" y="390" width="110" height="140" rx="6" fill="#ffffff" filter="url(#in-shadow)"/>
      <rect x="1335" y="412" width="80" height="7" rx="3.5" fill="#5a7d5a" opacity="0.3"/>
      <rect x="1335" y="428" width="55" height="5" rx="2.5" fill="#7fb069" opacity="0.25"/>
      <rect x="1335" y="440" width="70" height="5" rx="2.5" fill="#7fb069" opacity="0.2"/>
      <rect x="1335" y="452" width="50" height="5" rx="2.5" fill="#7fb069" opacity="0.15"/>
      <rect x="1335" y="468" width="80" height="14" rx="3" fill="#5a7d5a" opacity="0.08"/>
    </g>
  </g>

  <!-- Structured grid lines (data/editorial feel) -->
  <g stroke="#5a7d5a" stroke-width="0.7" fill="none" opacity="0.08">
    <!-- Vertical grid -->
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="900" y1="0" x2="900" y2="600"/>
    <line x1="1200" y1="0" x2="1200" y2="600"/>
    <line x1="1500" y1="0" x2="1500" y2="600"/>
    <!-- Horizontal grid -->
    <line x1="0" y1="150" x2="1920" y2="150"/>
    <line x1="0" y1="300" x2="1920" y2="300"/>
    <line x1="0" y1="450" x2="1920" y2="450"/>
  </g>

  <!-- Abstract bar chart shapes (data insight) -->
  <g fill="#7fb069" opacity="0.12">
    <rect x="680" y="180" width="12" height="80" rx="2"/>
    <rect x="700" y="150" width="12" height="110" rx="2"/>
    <rect x="720" y="200" width="12" height="60" rx="2"/>
    <rect x="740" y="130" width="12" height="130" rx="2"/>
    <rect x="760" y="170" width="12" height="90" rx="2"/>
  </g>

  <!-- Small bar chart right side -->
  <g fill="#5a7d5a" opacity="0.1">
    <rect x="1100" y="350" width="10" height="50" rx="2"/>
    <rect x="1116" y="320" width="10" height="80" rx="2"/>
    <rect x="1132" y="370" width="10" height="30" rx="2"/>
    <rect x="1148" y="300" width="10" height="100" rx="2"/>
    <rect x="1164" y="340" width="10" height="60" rx="2"/>
  </g>

  <!-- Diagonal accent lines (editorial style) -->
  <g stroke="#5a7d5a" stroke-width="1" fill="none" opacity="0.1" stroke-linecap="round">
    <line x1="850" y1="350" x2="950" y2="250"/>
    <line x1="870" y1="350" x2="970" y2="250"/>
    <line x1="890" y1="350" x2="990" y2="250"/>
    <line x1="910" y1="350" x2="1010" y2="250"/>
    <line x1="930" y1="350" x2="1030" y2="250"/>
  </g>

  <!-- Circular data points -->
  <g fill="#7fb069" opacity="0.15">
    <circle cx="580" cy="280" r="20"/>
    <circle cx="620" cy="260" r="14"/>
    <circle cx="650" cy="290" r="10"/>
    <circle cx="1250" cy="320" r="18"/>
    <circle cx="1290" cy="300" r="12"/>
    <circle cx="1320" cy="330" r="8"/>
  </g>

  <!-- Quote marks (editorial/news feel) -->
  <g fill="#5a7d5a" opacity="0.06">
    <text x="950" y="200" font-family="Georgia, serif" font-size="120" font-weight="bold">"</text>
    <text x="1050" y="480" font-family="Georgia, serif" font-size="100" font-weight="bold">"</text>
  </g>

  <!-- Small accent squares (structured grid feel) -->
  <g fill="#5a7d5a" opacity="0.1">
    <rect x="800" y="120" width="8" height="8"/>
    <rect x="816" y="120" width="8" height="8"/>
    <rect x="800" y="136" width="8" height="8"/>
    <rect x="816" y="136" width="8" height="8"/>
    <rect x="832" y="120" width="8" height="8"/>
    <rect x="832" y="136" width="8" height="8"/>
  </g>

  <g fill="#7fb069" opacity="0.12">
    <rect x="1000" y="420" width="6" height="6"/>
    <rect x="1012" y="420" width="6" height="6"/>
    <rect x="1024" y="420" width="6" height="6"/>
    <rect x="1000" y="432" width="6" height="6"/>
    <rect x="1012" y="432" width="6" height="6"/>
    <rect x="1024" y="432" width="6" height="6"/>
    <rect x="1000" y="444" width="6" height="6"/>
    <rect x="1012" y="444" width="6" height="6"/>
    <rect x="1024" y="444" width="6" height="6"/>
  </g>

  <!-- Flowing dashed line (timeline/story arc) -->
  <path d="M 100 300 Q 400 250 700 300 T 1300 280 T 1800 320" 
        stroke="#5a7d5a" stroke-width="1.5" fill="none" opacity="0.1" stroke-dasharray="10 8" stroke-linecap="round"/>

  <!-- Small dot accents scattered -->
  <g fill="#5a7d5a" opacity="0.18">
    <circle cx="100" cy="100" r="2.5"/>
    <circle cx="500" cy="80" r="2"/>
    <circle cx="850" cy="200" r="3"/>
    <circle cx="1250" cy="100" r="2"/>
    <circle cx="1450" cy="250" r="2.5"/>
    <circle cx="1850" cy="150" r="2"/>
    <circle cx="300" cy="550" r="3"/>
    <circle cx="700" cy="520" r="2"/>
    <circle cx="1000" cy="560" r="2.5"/>
    <circle cx="1400" cy="540" r="2"/>
    <circle cx="1800" cy="500" r="2.5"/>
  </g>

  <!-- Corner brackets (editorial framing) -->
  <g stroke="#5a7d5a" stroke-width="1.2" fill="none" opacity="0.1">
    <!-- Top left bracket -->
    <path d="M 60 60 L 60 100 L 100 100"/>
    <!-- Bottom right bracket -->
    <path d="M 1860 560 L 1860 520 L 1820 520"/>
  </g>
</svg>