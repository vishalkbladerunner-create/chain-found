<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Deep midnight indigo base — distinct purple-blue undertone vs existing navies -->
    <linearGradient id="ld-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1020"/>
      <stop offset="50%" stop-color="#0f1430"/>
      <stop offset="100%" stop-color="#13183d"/>
    </linearGradient>

    <!-- Soft indigo glow orbs -->
    <radialGradient id="ld-orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ld-orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2251ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2251ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ld-orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4d7fff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#4d7fff" stop-opacity="0"/>
    </radialGradient>

    <!-- Vision halo — warm prestige accent, very sparing -->
    <radialGradient id="ld-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c5a059" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c5a059" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base background -->
  <rect width="1920" height="600" fill="url(#ld-bg)"/>

  <!-- Large ambient orbs (right side, behind arcs) -->
  <circle cx="1500" cy="250" r="500" fill="url(#ld-orb1)"/>
  <circle cx="1700" cy="450" r="400" fill="url(#ld-orb2)"/>
  <circle cx="400" cy="500" r="350" fill="url(#ld-orb3)"/>

  <!-- ==================== CONCENTRIC ARCS — radiating influence/vision (right side) ==================== -->
  <g fill="none" stroke="#6366f1" stroke-width="1" opacity="0.10" stroke-linecap="round">
    <path d="M 1100 600 A 300 300 0 0 1 1400 300"/>
    <path d="M 1050 600 A 380 380 0 0 1 1430 220"/>
    <path d="M 1000 600 A 460 460 0 0 1 1460 140"/>
    <path d="M 950  600 A 540 540 0 0 1 1490 60"/>
  </g>
  <g fill="none" stroke="#2251ff" stroke-width="0.8" opacity="0.08" stroke-linecap="round">
    <path d="M 1150 600 A 250 250 0 0 1 1400 350"/>
    <path d="M 1200 600 A 200 200 0 0 1 1400 400"/>
    <path d="M 1250 600 A 150 150 0 0 1 1400 450"/>
  </g>

  <!-- ==================== ASCENDING DIAGONAL LINES — growth trajectory ==================== -->
  <g stroke="#4d7fff" stroke-width="0.6" opacity="0.09" stroke-linecap="round">
    <line x1="0" y1="520" x2="400" y2="320"/>
    <line x1="0" y1="560" x2="500" y2="300"/>
    <line x1="0" y1="600" x2="600" y2="280"/>
    <line x1="100" y1="600" x2="700" y2="280"/>
    <line x1="200" y1="600" x2="800" y2="300"/>
  </g>
  <!-- Second layer of ascending lines, slightly brighter -->
  <g stroke="#2251ff" stroke-width="0.8" opacity="0.07" stroke-linecap="round">
    <line x1="0" y1="480" x2="350" y2="280"/>
    <line x1="0" y1="440" x2="300" y2="240"/>
    <line x1="50" y1="600" x2="550" y2="320"/>
  </g>

  <!-- ==================== PRECISION GRID — top-right quadrant ==================== -->
  <g stroke="#6366f1" stroke-width="0.4" opacity="0.05">
    <!-- Verticals -->
    <line x1="1300" y1="0" x2="1300" y2="350"/>
    <line x1="1350" y1="0" x2="1350" y2="380"/>
    <line x1="1400" y1="0" x2="1400" y2="410"/>
    <line x1="1450" y1="0" x2="1450" y2="380"/>
    <line x1="1500" y1="0" x2="1500" y2="350"/>
    <line x1="1550" y1="0" x2="1550" y2="310"/>
    <line x1="1600" y1="0" x2="1600" y2="260"/>
    <line x1="1650" y1="0" x2="1650" y2="200"/>
    <line x1="1700" y1="0" x2="1700" y2="130"/>
    <!-- Horizontals -->
    <line x1="1300" y1="50" x2="1750" y2="50"/>
    <line x1="1300" y1="100" x2="1720" y2="100"/>
    <line x1="1300" y1="150" x2="1680" y2="150"/>
    <line x1="1300" y1="200" x2="1630" y2="200"/>
    <line x1="1300" y1="250" x2="1570" y2="250"/>
    <line x1="1300" y1="300" x2="1500" y2="300"/>
  </g>

  <!-- ==================== FOCAL NODES — vision points with halos ==================== -->
  <!-- Primary node — top-right, gold prestige accent -->
  <circle cx="1580" cy="120" r="60" fill="url(#ld-halo)"/>
  <circle cx="1580" cy="120" r="4" fill="#c5a059" opacity="0.5"/>
  <circle cx="1580" cy="120" r="12" fill="none" stroke="#c5a059" stroke-width="0.6" opacity="0.2"/>
  <circle cx="1580" cy="120" r="22" fill="none" stroke="#c5a059" stroke-width="0.4" opacity="0.1"/>

  <!-- Secondary nodes — brand blue -->
  <circle cx="1350" cy="280" r="45" fill="url(#ld-orb2)"/>
  <circle cx="1350" cy="280" r="3.5" fill="#2251ff" opacity="0.4"/>
  <circle cx="1350" cy="280" r="10" fill="none" stroke="#2251ff" stroke-width="0.5" opacity="0.15"/>

  <circle cx="1480" cy="380" r="40" fill="url(#ld-orb3)"/>
  <circle cx="1480" cy="380" r="3" fill="#4d7fff" opacity="0.35"/>
  <circle cx="1480" cy="380" r="9" fill="none" stroke="#4d7fff" stroke-width="0.5" opacity="0.12"/>

  <circle cx="1650" cy="240" r="35" fill="url(#ld-orb1)"/>
  <circle cx="1650" cy="240" r="2.5" fill="#6366f1" opacity="0.4"/>

  <!-- Tertiary nodes — smaller, scattered -->
  <circle cx="1420" cy="180" r="2" fill="#2251ff" opacity="0.25"/>
  <circle cx="1520" cy="300" r="2" fill="#4d7fff" opacity="0.2"/>
  <circle cx="1600" cy="340" r="1.5" fill="#6366f1" opacity="0.3"/>
  <circle cx="1380" cy="340" r="1.5" fill="#2251ff" opacity="0.2"/>

  <!-- ==================== CONNECTION LINES between nodes ==================== -->
  <g stroke="#2251ff" stroke-width="0.5" opacity="0.10" stroke-linecap="round">
    <line x1="1350" y1="280" x2="1420" y2="180"/>
    <line x1="1420" y1="180" x2="1580" y2="120"/>
    <line x1="1350" y1="280" x2="1480" y2="380"/>
    <line x1="1480" y1="380" x2="1600" y2="340"/>
    <line x1="1580" y1="120" x2="1650" y2="240"/>
    <line x1="1650" y1="240" x2="1520" y2="300"/>
  </g>

  <!-- ==================== DECORATIVE MICRO DOTS ==================== -->
  <g opacity="0.15">
    <circle cx="200" cy="150" r="1.5" fill="#6366f1"/>
    <circle cx="350" cy="100" r="1" fill="#2251ff"/>
    <circle cx="280" cy="220" r="1.2" fill="#4d7fff"/>
    <circle cx="450" cy="180" r="1" fill="#6366f1"/>
    <circle cx="550" cy="120" r="1.5" fill="#2251ff"/>
    <circle cx="620" cy="200" r="1" fill="#4d7fff"/>
    <circle cx="750" cy="150" r="1.2" fill="#6366f1"/>
    <circle cx="850" cy="250" r="1" fill="#2251ff"/>
    <circle cx="920" cy="180" r="1.5" fill="#4d7fff"/>
    <circle cx="1050" cy="120" r="1" fill="#6366f1"/>
    <circle cx="1800" cy="200" r="1.2" fill="#2251ff"/>
    <circle cx="1850" cy="350" r="1" fill="#4d7fff"/>
    <circle cx="1780" cy="450" r="1.5" fill="#6366f1"/>
    <circle cx="1720" cy="520" r="1" fill="#2251ff"/>
  </g>

  <!-- ==================== SUBTLE RING ACCENTS ==================== -->
  <g fill="none" stroke="#6366f1" stroke-width="0.6" opacity="0.08">
    <circle cx="1350" cy="280" r="28"/>
    <circle cx="1350" cy="280" r="42"/>
    <circle cx="1480" cy="380" r="24"/>
    <circle cx="1480" cy="380" r="36"/>
  </g>

  <!-- ==================== BOTTOM HORIZONTAL ACCENT LINE ==================== -->
  <line x1="0" y1="580" x2="600" y2="580" stroke="#2251ff" stroke-width="0.5" opacity="0.06" stroke-linecap="round"/>
  <line x1="800" y1="580" x2="1200" y2="580" stroke="#4d7fff" stroke-width="0.4" opacity="0.05" stroke-linecap="round"/>
</svg>