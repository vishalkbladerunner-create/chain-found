<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Deep navy background -->
    <linearGradient id="oxBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1428"/>
      <stop offset="50%" stop-color="#0d1f3a"/>
      <stop offset="100%" stop-color="#0a1a30"/>
    </linearGradient>

    <!-- Blue radial glow -->
    <radialGradient id="oxGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2251ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2251ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Orb ring gradient -->
    <linearGradient id="oxRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4d7fff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2251ff" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="1600" height="900" fill="url(#oxBg)"/>

  <!-- Central glow orb -->
  <ellipse cx="800" cy="450" rx="500" ry="350" fill="url(#oxGlow)"/>

  <!-- Concentric oracle rings (crystal ball effect) -->
  <g fill="none" stroke="url(#oxRing)" stroke-width="1.2" opacity="0.6">
    <ellipse cx="800" cy="450" rx="200" ry="140"/>
    <ellipse cx="800" cy="450" rx="280" ry="196"/>
    <ellipse cx="800" cy="450" rx="360" ry="252"/>
    <ellipse cx="800" cy="450" rx="440" ry="308"/>
    <ellipse cx="800" cy="450" rx="520" ry="364"/>
  </g>

  <!-- Rotated concentric rings for 3D effect -->
  <g fill="none" stroke="#4d7fff" stroke-width="0.8" opacity="0.25" transform="rotate(30 800 450)">
    <ellipse cx="800" cy="450" rx="180" ry="260"/>
    <ellipse cx="800" cy="450" rx="260" ry="340"/>
    <ellipse cx="800" cy="450" rx="340" ry="420"/>
  </g>

  <!-- Radiating lines from center -->
  <g stroke="#4d7fff" stroke-width="0.6" fill="none" opacity="0.2">
    <line x1="800" y1="450" x2="200" y2="100"/>
    <line x1="800" y1="450" x2="1400" y2="100"/>
    <line x1="800" y1="450" x2="200" y2="800"/>
    <line x1="800" y1="450" x2="1400" y2="800"/>
    <line x1="800" y1="450" x2="800" y2="50"/>
    <line x1="800" y1="450" x2="800" y2="850"/>
    <line x1="800" y1="450" x2="400" y2="450"/>
    <line x1="800" y1="450" x2="1200" y2="450"/>
  </g>

  <!-- Outer decorative arcs -->
  <path d="M 200 200 Q 800 50 1400 200" fill="none" stroke="#4d7fff" stroke-width="1" opacity="0.15"/>
  <path d="M 100 450 Q 800 250 1500 450" fill="none" stroke="#4d7fff" stroke-width="1" opacity="0.12"/>
  <path d="M 200 700 Q 800 850 1400 700" fill="none" stroke="#4d7fff" stroke-width="1" opacity="0.15"/>

  <!-- Small floating hexagons -->
  <g fill="none" stroke="#4d7fff" stroke-width="0.8" opacity="0.3">
    <polygon points="250,250 270,261 270,283 250,294 230,283 230,261"/>
    <polygon points="1350,600 1370,611 1370,633 1350,644 1330,633 1330,611"/>
    <polygon points="150,650 165,658 165,675 150,683 135,675 135,658"/>
  </g>

  <!-- Corner accent dots -->
  <g fill="#4d7fff" opacity="0.4">
    <circle cx="150" cy="150" r="3"/>
    <circle cx="180" cy="130" r="2"/>
    <circle cx="130" cy="180" r="2.5"/>
    <circle cx="1450" cy="750" r="3"/>
    <circle cx="1480" cy="730" r="2"/>
    <circle cx="1430" cy="780" r="2.5"/>
  </g>

  <!-- Subtle grid -->
  <g stroke="#2251ff" stroke-width="0.4" fill="none" opacity="0.06">
    <line x1="0" y1="300" x2="1600" y2="300"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
  </g>

  <!-- Glowing center point -->
  <circle cx="800" cy="450" r="4" fill="#4d7fff" opacity="0.6"/>
  <circle cx="800" cy="450" r="12" fill="none" stroke="#4d7fff" stroke-width="0.8" opacity="0.3"/>
  <circle cx="800" cy="450" r="24" fill="none" stroke="#4d7fff" stroke-width="0.6" opacity="0.15"/>
</svg>