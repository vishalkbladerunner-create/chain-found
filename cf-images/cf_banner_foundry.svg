<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Deep forge gradient -->
    <linearGradient id="fr-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1420"/>
      <stop offset="50%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#070f18"/>
    </linearGradient>

    <!-- Bright blue glow orb -->
    <radialGradient id="fr-orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2251ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2251ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Cyan accent glow -->
    <radialGradient id="fr-orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4d7fff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4d7fff" stop-opacity="0"/>
    </radialGradient>

    <!-- Stream gradient -->
    <linearGradient id="fr-stream" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2251ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#4d7fff" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#6b9fff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4d7fff" stop-opacity="0"/>
    </linearGradient>

    <!-- Bright shape fill -->
    <linearGradient id="fr-shape" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a7a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#2251ff" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Shape side fill -->
    <linearGradient id="fr-shape-side" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4d7fff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2251ff" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Base dark background -->
  <rect width="1920" height="600" fill="url(#fr-bg)"/>

  <!-- Large ambient glow orbs -->
  <circle cx="350" cy="500" r="450" fill="url(#fr-orb1)"/>
  <circle cx="1650" cy="120" r="400" fill="url(#fr-orb2)"/>
  <circle cx="960" cy="80" r="300" fill="url(#fr-orb1)" opacity="0.8"/>

  <!-- Flowing luminous streams -->
  <g fill="none" stroke-linecap="round">
    <!-- Main stream 1 -->
    <path d="M 0 350 Q 300 280 600 340 T 1200 300 T 1920 380" stroke="url(#fr-stream)" stroke-width="4" opacity="0.9"/>
    <path d="M 0 370 Q 300 300 600 360 T 1200 320 T 1920 400" stroke="url(#fr-stream)" stroke-width="2.5" opacity="0.6"/>

    <!-- Main stream 2 (upper) -->
    <path d="M 0 200 Q 400 150 700 210 T 1400 170 T 1920 230" stroke="#4d7fff" stroke-width="3" opacity="0.7"/>
    <path d="M 0 215 Q 400 165 700 225 T 1400 185 T 1920 245" stroke="#6b9fff" stroke-width="2" opacity="0.45"/>

    <!-- Lower stream -->
    <path d="M 200 500 Q 500 450 800 510 T 1500 470 T 1920 530" stroke="#4d7fff" stroke-width="3" opacity="0.5"/>
  </g>

  <!-- Anvil / forge block shapes - LEFT (brightened) -->
  <g>
    <!-- Main hexagon body -->
    <polygon points="180,420 260,380 340,420 340,460 260,500 180,460" fill="url(#fr-shape)" stroke="#4d7fff" stroke-width="1.5" opacity="0.9"/>
    <polygon points="180,420 260,380 260,420 180,460" fill="url(#fr-shape-side)" opacity="0.7"/>
    <polygon points="260,380 340,420 340,460 260,420" fill="#2251ff" opacity="0.25"/>
    <!-- Top bright glow edge -->
    <line x1="180" y1="420" x2="260" y2="380" stroke="#6b9fff" stroke-width="2.5" opacity="0.9"/>
    <line x1="260" y1="380" x2="340" y2="420" stroke="#4d7fff" stroke-width="2" opacity="0.7"/>
    <!-- Vertical edge accents -->
    <line x1="180" y1="420" x2="180" y2="460" stroke="#4d7fff" stroke-width="1" opacity="0.6"/>
    <line x1="340" y1="420" x2="340" y2="460" stroke="#4d7fff" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Anvil / forge block shapes - RIGHT (brightened) -->
  <g>
    <polygon points="1580,320 1660,280 1740,320 1740,360 1660,400 1580,360" fill="url(#fr-shape)" stroke="#4d7fff" stroke-width="1.5" opacity="0.9"/>
    <polygon points="1580,320 1660,280 1660,320 1580,360" fill="url(#fr-shape-side)" opacity="0.7"/>
    <polygon points="1660,280 1740,320 1740,360 1660,320" fill="#2251ff" opacity="0.25"/>
    <line x1="1580" y1="320" x2="1660" y2="280" stroke="#6b9fff" stroke-width="2.5" opacity="0.8"/>
    <line x1="1660" y1="280" x2="1740" y2="320" stroke="#4d7fff" stroke-width="2" opacity="0.6"/>
    <line x1="1580" y1="320" x2="1580" y2="360" stroke="#4d7fff" stroke-width="1" opacity="0.6"/>
    <line x1="1740" y1="320" x2="1740" y2="360" stroke="#4d7fff" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Spark particles (brightened) -->
  <g fill="#6b9fff">
    <circle cx="260" cy="360" r="4" opacity="0.9"/>
    <circle cx="280" cy="340" r="3" opacity="0.8"/>
    <circle cx="240" cy="350" r="3.5" opacity="0.85"/>
    <circle cx="300" cy="370" r="2.5" opacity="0.7"/>
    <circle cx="220" cy="380" r="3" opacity="0.75"/>
    <circle cx="1660" cy="260" r="4" opacity="0.9"/>
    <circle cx="1680" cy="240" r="3" opacity="0.8"/>
    <circle cx="1640" cy="250" r="3.5" opacity="0.85"/>
    <circle cx="1700" cy="270" r="2.5" opacity="0.7"/>
  </g>

  <!-- Rising spark trails (brightened) -->
  <g stroke="#6b9fff" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round">
    <path d="M 260 360 Q 265 320 255 280"/>
    <path d="M 280 340 Q 285 300 275 260"/>
    <path d="M 240 350 Q 235 310 245 270"/>
    <path d="M 1660 260 Q 1655 220 1665 180"/>
    <path d="M 1680 240 Q 1685 200 1675 160"/>
  </g>

  <!-- Geometric mold blocks (brightened) -->
  <g fill="#1a3a7a" stroke="#4d7fff" stroke-width="1" opacity="0.7">
    <rect x="520" y="180" width="40" height="40" transform="rotate(15 540 200)"/>
    <rect x="580" y="200" width="30" height="30" transform="rotate(-10 595 215)"/>
    <rect x="1300" y="420" width="35" height="35" transform="rotate(20 1317 437)"/>
    <rect x="1250" y="450" width="25" height="25" transform="rotate(-15 1262 462)"/>
  </g>

  <!-- Grid lines (brightened) -->
  <g stroke="#4d7fff" stroke-width="0.6" fill="none" opacity="0.15">
    <line x1="0" y1="520" x2="1920" y2="520"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="560" x2="1920" y2="560"/>
    <line x1="0" y1="580" x2="1920" y2="580"/>
    <line x1="400" y1="500" x2="400" y2="600"/>
    <line x1="800" y1="500" x2="800" y2="600"/>
    <line x1="1200" y1="500" x2="1200" y2="600"/>
    <line x1="1600" y1="500" x2="1600" y2="600"/>
  </g>

  <!-- Glowing rings around anvils -->
  <g fill="none" stroke="#4d7fff" stroke-width="1.2" opacity="0.25">
    <circle cx="260" cy="440" r="70"/>
    <circle cx="260" cy="440" r="100"/>
    <circle cx="1660" cy="340" r="65"/>
    <circle cx="1660" cy="340" r="95"/>
  </g>

  <!-- Accent dots scattered (brightened) -->
  <g fill="#6b9fff" opacity="0.45">
    <circle cx="100" cy="100" r="3"/>
    <circle cx="500" cy="80" r="2.5"/>
    <circle cx="850" cy="200" r="3.5"/>
    <circle cx="1250" cy="100" r="2.5"/>
    <circle cx="1450" cy="250" r="3"/>
    <circle cx="1850" cy="150" r="2.5"/>
    <circle cx="300" cy="550" r="3.5"/>
    <circle cx="700" cy="520" r="2.5"/>
    <circle cx="1000" cy="560" r="3"/>
    <circle cx="1400" cy="540" r="2.5"/>
    <circle cx="1800" cy="500" r="3"/>
  </g>

  <!-- Diagonal light rays -->
  <g stroke="#4d7fff" stroke-width="1" fill="none" opacity="0.2">
    <line x1="750" y1="350" x2="850" y2="250"/>
    <line x1="770" y1="350" x2="870" y2="250"/>
    <line x1="790" y1="350" x2="890" y2="250"/>
    <line x1="810" y1="350" x2="910" y2="250"/>
    <line x1="830" y1="350" x2="930" y2="250"/>
  </g>

  <!-- Connection lines between blocks and streams -->
  <g stroke="#6b9fff" stroke-width="1" fill="none" opacity="0.3" stroke-linecap="round">
    <line x1="340" y1="420" x2="400" y2="400"/>
    <line x1="1580" y1="360" x2="1520" y2="380"/>
  </g>
</svg>