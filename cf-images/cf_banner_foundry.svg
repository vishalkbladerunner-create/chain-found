<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Soft blue radial glow -->
    <radialGradient id="f-orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8f0ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Light blue line gradient -->
    <linearGradient id="f-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4d7fff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4d7fff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4d7fff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Pure white base -->
  <rect width="1920" height="600" fill="#ffffff"/>

  <!-- Large soft blue ambient orbs (very subtle) -->
  <circle cx="1400" cy="200" r="500" fill="url(#f-orb)"/>
  <circle cx="300" cy="450" r="450" fill="url(#f-orb)"/>

  <!-- Thin horizontal grid lines (architectural feel) -->
  <g stroke="#c8d8f5" stroke-width="0.8" fill="none">
    <line x1="0" y1="120" x2="1920" y2="120"/>
    <line x1="0" y1="240" x2="1920" y2="240"/>
    <line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="480" x2="1920" y2="480"/>
  </g>

  <!-- Thin vertical grid lines -->
  <g stroke="#c8d8f5" stroke-width="0.8" fill="none">
    <line x1="320" y1="0" x2="320" y2="600"/>
    <line x1="640" y1="0" x2="640" y2="600"/>
    <line x1="960" y1="0" x2="960" y2="600"/>
    <line x1="1280" y1="0" x2="1280" y2="600"/>
    <line x1="1600" y1="0" x2="1600" y2="600"/>
  </g>

  <!-- Large floating circles (soft, decorative) -->
  <g fill="none" stroke="#d6e3fa" stroke-width="1">
    <circle cx="260" cy="200" r="80"/>
    <circle cx="260" cy="200" r="120"/>
    <circle cx="1660" cy="400" r="100"/>
    <circle cx="1660" cy="400" r="150"/>
  </g>

  <!-- Large arc curves (elegant, sweeping) -->
  <path d="M -100 500 Q 480 200 1060 500 T 2020 500" fill="none" stroke="#d6e3fa" stroke-width="1.2"/>
  <path d="M -100 420 Q 480 120 1060 420 T 2020 420" fill="none" stroke="#e8f0ff" stroke-width="1"/>
  <path d="M -100 580 Q 480 280 1060 580 T 2020 580" fill="none" stroke="#e8f0ff" stroke-width="1"/>

  <!-- Right-side diagonal sweep -->
  <path d="M 1200 -50 Q 1500 300 1800 650" fill="none" stroke="#d6e3fa" stroke-width="1"/>
  <path d="M 1300 -50 Q 1600 300 1900 650" fill="none" stroke="#e8f0ff" stroke-width="0.8"/>

  <!-- Scattered small dots (data points) -->
  <g fill="#a8c2f0">
    <circle cx="420" cy="180" r="3"/>
    <circle cx="480" cy="140" r="2"/>
    <circle cx="520" cy="220" r="2.5"/>
    <circle cx="580" cy="160" r="2"/>
    <circle cx="620" cy="200" r="3"/>
    <circle cx="720" cy="280" r="2"/>
    <circle cx="780" cy="320" r="2.5"/>
    <circle cx="820" cy="260" r="2"/>
    <circle cx="1100" cy="150" r="3"/>
    <circle cx="1150" cy="190" r="2"/>
    <circle cx="1200" cy="130" r="2.5"/>
    <circle cx="1380" cy="280" r="2"/>
    <circle cx="1420" cy="320" r="3"/>
    <circle cx="1480" cy="260" r="2"/>
    <circle cx="1520" cy="300" r="2.5"/>
    <circle cx="1580" cy="240" r="2"/>
    <circle cx="1720" cy="180" r="2.5"/>
    <circle cx="1780" cy="220" r="2"/>
    <circle cx="1820" cy="160" r="3"/>
    <circle cx="1880" cy="200" r="2"/>
  </g>

  <!-- Small connecting lines between dots (subtle network) -->
  <g stroke="#c8d8f5" stroke-width="0.6" fill="none">
    <line x1="420" y1="180" x2="480" y2="140"/>
    <line x1="480" y1="140" x2="520" y2="220"/>
    <line x1="520" y1="220" x2="580" y2="160"/>
    <line x1="580" y1="160" x2="620" y2="200"/>
    <line x1="1100" y1="150" x2="1150" y2="190"/>
    <line x1="1150" y1="190" x2="1200" y2="130"/>
    <line x1="1380" y1="280" x2="1420" y2="320"/>
    <line x1="1420" y1="320" x2="1480" y2="260"/>
    <line x1="1480" y1="260" x2="1520" y2="300"/>
  </g>

  <!-- Larger hollow circles -->
  <g fill="none" stroke="#c8d8f5" stroke-width="0.9">
    <circle cx="450" cy="400" r="35"/>
    <circle cx="1250" cy="350" r="45"/>
    <circle cx="850" cy="480" r="30"/>
  </g>

  <!-- Subtle corner brackets (architectural framing) -->
  <g stroke="#c8d8f5" stroke-width="1" fill="none">
    <path d="M 60 60 L 60 100 L 100 100"/>
    <path d="M 1860 560 L 1860 520 L 1820 520"/>
  </g>

  <!-- Bottom-right large geometric shape (abstract block) -->
  <g fill="none" stroke="#d6e3fa" stroke-width="1" opacity="0.7">
    <rect x="1550" y="80" width="60" height="60" transform="rotate(15 1580 110)"/>
    <rect x="1650" y="150" width="45" height="45" transform="rotate(-10 1672 172)"/>
    <rect x="1750" y="100" width="35" height="35" transform="rotate(25 1767 117)"/>
  </g>

  <!-- Left-side floating rectangles -->
  <g fill="none" stroke="#d6e3fa" stroke-width="0.9" opacity="0.6">
    <rect x="80" y="350" width="50" height="50" transform="rotate(-12 105 375)"/>
    <rect x="150" y="420" width="35" height="35" transform="rotate(18 167 437)"/>
  </g>

  <!-- Soft dashed line (path/flow) -->
  <path d="M 200 280 Q 500 180 800 280 T 1400 280" fill="none" stroke="#c8d8f5" stroke-width="0.8" stroke-dasharray="6 6"/>
</svg>