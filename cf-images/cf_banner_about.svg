<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Soft blue-to-white gradient -->
    <linearGradient id="ab-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f8ff"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>

    <!-- Soft radial glow -->
    <radialGradient id="ab-orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0ecff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft gradient base -->
  <rect width="1920" height="600" fill="url(#ab-bg)"/>

  <!-- Large soft orbs -->
  <circle cx="200" cy="150" r="400" fill="url(#ab-orb)"/>
  <circle cx="1700" cy="450" r="450" fill="url(#ab-orb)"/>

  <!-- Large thin concentric circles (top right) -->
  <g fill="none" stroke="#c8d8f5" stroke-width="0.9" opacity="0.7">
    <circle cx="1500" cy="180" r="60"/>
    <circle cx="1500" cy="180" r="100"/>
    <circle cx="1500" cy="180" r="140"/>
    <circle cx="1500" cy="180" r="180"/>
  </g>

  <!-- Large thin concentric circles (bottom left) -->
  <g fill="none" stroke="#c8d8f5" stroke-width="0.9" opacity="0.6">
    <circle cx="350" cy="420" r="50"/>
    <circle cx="350" cy="420" r="90"/>
    <circle cx="350" cy="420" r="130"/>
    <circle cx="350" cy="420" r="170"/>
  </g>

  <!-- Horizontal flowing wave lines -->
  <path d="M 0 250 Q 320 200 640 250 T 1280 250 T 1920 250" fill="none" stroke="#d6e3fa" stroke-width="1.2"/>
  <path d="M 0 300 Q 320 250 640 300 T 1280 300 T 1920 300" fill="none" stroke="#c8d8f5" stroke-width="0.9"/>
  <path d="M 0 350 Q 320 300 640 350 T 1280 350 T 1920 350" fill="none" stroke="#e8f0ff" stroke-width="1"/>

  <!-- Diagonal lines (subtle) -->
  <g stroke="#d6e3fa" stroke-width="0.7" fill="none" opacity="0.5">
    <line x1="700" y1="0" x2="900" y2="200"/>
    <line x1="720" y1="0" x2="920" y2="200"/>
    <line x1="740" y1="0" x2="940" y2="200"/>
  </g>

  <!-- Scattered dots -->
  <g fill="#a8c2f0">
    <circle cx="500" cy="120" r="2.5"/>
    <circle cx="550" cy="160" r="2"/>
    <circle cx="600" cy="100" r="3"/>
    <circle cx="650" cy="140" r="2"/>
    <circle cx="700" cy="180" r="2.5"/>
    <circle cx="800" cy="450" r="3"/>
    <circle cx="850" cy="490" r="2"/>
    <circle cx="900" cy="430" r="2.5"/>
    <circle cx="950" cy="470" r="2"/>
    <circle cx="1000" cy="510" r="3"/>
    <circle cx="1200" cy="350" r="2.5"/>
    <circle cx="1250" cy="390" r="2"/>
    <circle cx="1300" cy="330" r="3"/>
    <circle cx="1350" cy="370" r="2"/>
    <circle cx="1400" cy="410" r="2.5"/>
  </g>

  <!-- Small squares grid pattern (top left area) -->
  <g fill="#c8d8f5" opacity="0.4">
    <rect x="120" y="80" width="6" height="6"/>
    <rect x="140" y="80" width="6" height="6"/>
    <rect x="160" y="80" width="6" height="6"/>
    <rect x="120" y="100" width="6" height="6"/>
    <rect x="140" y="100" width="6" height="6"/>
    <rect x="160" y="100" width="6" height="6"/>
    <rect x="120" y="120" width="6" height="6"/>
    <rect x="140" y="120" width="6" height="6"/>
    <rect x="160" y="120" width="6" height="6"/>
  </g>

  <!-- Arc curves (right side) -->
  <path d="M 1300 0 Q 1400 300 1500 600" fill="none" stroke="#d6e3fa" stroke-width="1"/>
  <path d="M 1350 0 Q 1450 300 1550 600" fill="none" stroke="#e8f0ff" stroke-width="0.8"/>

  <!-- Small hollow circles scattered -->
  <g fill="none" stroke="#c8d8f5" stroke-width="0.9" opacity="0.6">
    <circle cx="450" cy="280" r="20"/>
    <circle cx="1100" cy="480" r="25"/>
    <circle cx="1600" cy="380" r="18"/>
  </g>

  <!-- Corner accent lines -->
  <g stroke="#c8d8f5" stroke-width="1" fill="none">
    <path d="M 50 50 L 50 90 L 90 90"/>
    <path d="M 1870 550 L 1870 510 L 1830 510"/>
  </g>
</svg>