<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="zpBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06182E"/>
      <stop offset="55%" stop-color="#0B2954"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
    <linearGradient id="zpBolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2251ff"/>
      <stop offset="100%" stop-color="#4d7fff"/>
    </linearGradient>
    <linearGradient id="zpBolt2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4d7fff"/>
      <stop offset="100%" stop-color="#6b9fff"/>
    </linearGradient>
    <radialGradient id="zpFlare" cx="0.78" cy="0.4" r="0.45">
      <stop offset="0%" stop-color="#2251ff" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#4d7fff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4d7fff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="zpGrid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0 L0 0 0 60" fill="none" stroke="#4d7fff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#zpBg)"/>
  <rect width="1600" height="900" fill="url(#zpGrid)"/>
  <rect width="1600" height="900" fill="url(#zpFlare)"/>
  <!-- card-shape silhouettes scattered, faint -->
  <g fill="none" stroke="#FFFFFF" stroke-opacity="0.06">
    <rect x="150" y="180" width="120" height="170" rx="10" transform="rotate(-12 210 265)"/>
    <rect x="320" y="240" width="120" height="170" rx="10" transform="rotate(8 380 325)"/>
    <rect x="500" y="180" width="120" height="170" rx="10" transform="rotate(-4 560 265)"/>
    <rect x="220" y="540" width="120" height="170" rx="10" transform="rotate(15 280 625)"/>
    <rect x="420" y="580" width="120" height="170" rx="10" transform="rotate(-8 480 665)"/>
    <rect x="700" y="640" width="120" height="170" rx="10" transform="rotate(6 760 725)"/>
  </g>
  <!-- lightning-bolt streaks (zigzag paths) -->
  <g fill="none" stroke-linejoin="miter" stroke-linecap="round">
    <path d="M-80 250 L 280 380 L 220 460 L 540 600 L 480 680 L 760 820"
          stroke="url(#zpBolt)" stroke-width="3" opacity="0.85"/>
    <path d="M120 -60 L 480 220 L 380 320 L 700 540 L 620 660 L 980 920"
          stroke="url(#zpBolt2)" stroke-width="2.5" opacity="0.75"/>
    <path d="M900 -40 L 1180 280 L 1080 400 L 1340 620 L 1260 760 L 1500 950"
          stroke="url(#zpBolt)" stroke-width="2" opacity="0.6"/>
  </g>
  <!-- spark dots -->
  <g fill="#2251ff">
    <circle cx="280" cy="380" r="4" opacity="0.9"/>
    <circle cx="540" cy="600" r="3" opacity="0.8"/>
    <circle cx="700" cy="540" r="3" opacity="0.7"/>
    <circle cx="1180" cy="280" r="3" opacity="0.7"/>
    <circle cx="1340" cy="620" r="3" opacity="0.7"/>
  </g>
  <g fill="#4d7fff">
    <circle cx="480" cy="220" r="3" opacity="0.8"/>
    <circle cx="760" cy="820" r="2.5" opacity="0.6"/>
    <circle cx="1080" cy="400" r="2.5" opacity="0.7"/>
  </g>
</svg>
